# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

env:
  - GO111MODULE=on
  - PMUX_HMAC_SECRET={{ if index .Env "PMUX_HMAC_SECRET" }}{{ .Env.PMUX_HMAC_SECRET }}{{ end }}

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: pmux-linux
    tool: ./scripts/garble.sh
    main: ./cmd/pmux
    binary: pmux
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X 'main.hmacSecret={{ .Env.PMUX_HMAC_SECRET }}'

  - id: pmux-darwin
    tool: ./scripts/garble.sh
    main: ./cmd/pmux
    binary: pmux
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X 'main.hmacSecret={{ .Env.PMUX_HMAC_SECRET }}'

universal_binaries:
  - id: pmux-darwin-universal
    ids:
      - pmux-darwin
    name_template: pmux
    replace: true
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "all" }}universal
      {{- else if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end -}}
    format_overrides:
      - goos: darwin
        formats: [zip]
    files:
      - LICENSE
      - README.md

# Linux packages (DEB + RPM) via nFPM
nfpms:
  - id: pmux-linux-packages
    package_name: pmux
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - pmux-linux
    vendor: ShiftinBits Inc.
    homepage: https://pmux.io
    maintainer: ShiftinBits Inc. <hello@shiftinbits.com>
    description: |-
      Your tmux sessions, in your pocket.
      Secure and private access to your tmux sessions from your phone.
      End-to-end encrypted, peer-to-peer connected.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    dependencies:
      - tmux
    recommends:
      - systemd
    contents:
      - src: LICENSE
        dst: /usr/share/doc/pmux/LICENSE
        file_info:
          mode: 0644
      - src: README.md
        dst: /usr/share/doc/pmux/README.md
        file_info:
          mode: 0644
    overrides:
      rpm:
        dependencies:
          - tmux

# Snap package for Ubuntu/Linux (classic confinement — requires Store approval)
snapcrafts:
  - id: pmux-snap
    ids:
      - pmux-linux
    name: pmux
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    title: pmux
    publish: true
    grade: stable
    confinement: devmode
    license: MIT
    base: core24
    channel_templates:
      - stable
    summary: Secure remote tmux access from your phone
    description: |
      pmux lets you securely access your tmux terminal sessions
      from your mobile device. End-to-end encrypted, peer-to-peer connected.

      pmux is a transparent tmux wrapper — use it exactly like tmux. Your
      sessions are accessible from the PocketMux mobile app via WebRTC.

      Requires tmux to be installed on the system.
    apps:
      pmux:
        command: pmux

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: gpg2
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: New Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 100
    - title: Bug Fixes
      regexp: '^.*?(fix|refactor)(\(.+\))?!?:.+$'
      order: 200
    - title: Other
      order: 9999

# macOS code signing and notarization (env-gated, skipped in snapshots)
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - pmux-darwin-universal
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

# Publish Homebrew cask to tap repo (env-gated, skipped if token not set)
homebrew_casks:
  - name: pmux
    skip_upload: '{{ if not (isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN") }}true{{ end }}'
    ids:
      - default
    repository:
      owner: ShiftinBits
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://pmux.io"
    description: "Secure and private remote tmux access from your phone"
    license: MIT
    commit_msg_template: "chore: update pmux to {{ .Tag }}"

    caveats: |
      The pmux agent service will be stopped and removed on uninstall.

      For full cleanup (including un-registering this host from the
      signaling server), run before uninstalling:

        pmux uninstall

    uninstall:
      launchctl:
        - io.pmux.agent
      delete:
        - "~/Library/LaunchAgents/io.pmux.agent.plist"

    zap:
      trash:
        - "~/.config/pmux"

    hooks:
      pre:
        uninstall: |
          system_command "#{staged_path}/pmux", args: ["uninstall", "--keep-config", "--yes"]
